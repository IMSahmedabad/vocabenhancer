<style>
*{box-sizing:border-box;margin:0;padding:0}
.app{font-family:var(--font-sans);background:#f0f4fa;min-height:600px;color:#1a1a2e}
.hg{height:5px;background:#C8941A;width:100%}
.hb{background:#1F3864;padding:12px 16px;color:#fff;display:flex;align-items:center;gap:10px}
.hs{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;opacity:.55;margin-bottom:2px}
.ht{font-size:17px;font-weight:600;color:#fff}
.hm{font-size:12px;opacity:.7;margin-top:1px;color:#fff}
.pg{padding:16px;max-width:540px;margin:0 auto}
.card{background:#fff;border:1.5px solid #d4daea;border-radius:12px;padding:18px}
label{display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:5px;margin-top:14px}
label:first-child{margin-top:0}
select,input[type=text],input[type=password]{width:100%;padding:11px 13px;border:2px solid #d4daea;border-radius:8px;font-size:15px;background:#fff;color:#1a1a2e;outline:none}
select:focus,input:focus{border-color:#1F3864}
.btn{display:block;width:100%;padding:13px 16px;border-radius:8px;border:none;cursor:pointer;font-size:15px;font-weight:700;text-align:center;font-family:inherit;background:#1F3864 !important;color:#fff !important}
.btn:hover{background:#162d52 !important}
.hint{font-size:12px;color:#5f6b7a;margin-top:5px;line-height:1.5;background:#f0f4fa;padding:7px 10px;border-radius:6px}
.err{font-size:13px;color:#b91c1c;background:#fff0f0;border:1.5px solid #fca5a5;padding:9px 12px;border-radius:7px;margin-top:10px}
.mgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-top:14px}
.mcard{background:#fff;border:2px solid #d4daea;border-radius:12px;padding:14px 10px;cursor:pointer;text-align:center;transition:border-color .2s}
.mcard:hover{border-color:#1F3864}
.micon{font-size:26px;margin-bottom:7px}
.mname{font-size:13px;font-weight:600;color:#1F3864}
.mcnt{font-size:11px;color:#6b7280;margin-top:2px}
.pbar{height:6px;background:#d4daea;border-radius:3px;overflow:hidden;margin-bottom:16px}
.pfill{height:100%;background:#C8941A;border-radius:3px;transition:width .3s}
.fcwrap{perspective:1200px;height:300px;cursor:pointer;user-select:none;margin-bottom:16px}
.fci{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform .5s}
.fci.flipped{transform:rotateY(180deg)}
.fcf,.fcb{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:22px;text-align:center}
.fcf{border:3px solid #C8941A}
.fcb{background:#fff;border:2px solid #c5d0e8;transform:rotateY(180deg)}
.fcword{font-size:30px;font-weight:700;color:#fff;line-height:1.2}
.fcpos{font-size:13px;color:#C8941A;margin-top:6px;font-style:italic}
.fchint{font-size:12px;color:rgba(255,255,255,.5);margin-top:14px}
.fcbtitle{font-size:20px;font-weight:700;color:#1F3864;margin-bottom:4px}
.fcbmean{font-size:15px;color:#1a1a2e;margin-bottom:12px;line-height:1.5}
.stag{display:inline-block;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;margin:2px;background:#166534;color:#fff}
.atag{display:inline-block;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;margin:2px;background:#9d174d;color:#fff}
.fcex{font-size:13px;color:#444;font-style:italic;margin-top:10px;padding-top:10px;border-top:1px solid #e5eaf0;width:100%}
.fcnav{background:#1F3864;border-radius:10px;padding:10px;display:flex;gap:8px;align-items:center;margin-bottom:12px}
.fcnb{flex:1;background:#2d4f7c !important;color:#fff !important;border:2px solid #4a6fa5 !important;padding:10px 6px;border-radius:7px;cursor:pointer;font-size:14px;font-weight:700;text-align:center;font-family:inherit}
.fcnb:hover{background:#3a6494 !important}
.fcnb:disabled{opacity:.35;cursor:default}
.fcnb.gold{background:#C8941A !important;border-color:#e8a825 !important;color:#fff !important}
.fcnb.gold:hover{background:#a87816 !important}
.fccount{font-size:12px;color:rgba(255,255,255,.75);text-align:center;min-width:70px}
.qbox{background:#fff;border:2px solid #d4daea;border-radius:12px;padding:20px 18px;margin-bottom:16px}
.qtext{font-size:18px;font-weight:700;color:#1a1a2e;line-height:1.5}
.qopt{display:block;width:100%;text-align:left;padding:14px 16px;border-radius:10px;cursor:pointer;font-size:15px;font-weight:600;margin-bottom:10px;font-family:inherit;transition:background .15s;background:#1e3a6e !important;color:#ffffff !important;border:2px solid #4a6fa5 !important}
.qopt:hover:not(:disabled){background:#2d5498 !important;border-color:#6b8fcf !important}
.qopt.correct{background:#166534 !important;color:#fff !important;border-color:#16a34a !important}
.qopt.wrong{background:#7f1d1d !important;color:#fff !important;border-color:#dc2626 !important}
.qopt:disabled{cursor:default}
.qexp{font-size:14px;color:#fff;background:#1e3a6e;padding:13px 15px;border-radius:9px;margin-top:2px;line-height:1.6;border-left:4px solid #C8941A}
.rsc{font-size:52px;font-weight:700;text-align:center;margin:10px 0 4px}
.rlbl{font-size:20px;font-weight:600;text-align:center;margin-bottom:4px}
.stbl{width:100%;border-collapse:collapse;font-size:13px}
.stbl th{background:#1F3864;color:#fff;padding:9px 10px;text-align:left;font-weight:600}
.stbl td{padding:8px 10px;border-bottom:1px solid #e5eaf0;color:#1a1a2e;background:#fff}
.stbl tr:nth-child(even) td{background:#f8fafc}
.sbox{background:#fff;border:1.5px solid #d4daea;border-radius:10px;padding:12px;text-align:center}
.sn{font-size:26px;font-weight:700;color:#1F3864}
.sl{font-size:11px;color:#6b7280;margin-top:2px}
.bdg{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;background:#1F3864;color:#fff}
</style>

["Simile","Comparison using 'as', 'like', or 'so'.","White like snow; Red as a tomato."],

["Personification","Giving inanimate objects human attributes.","The winds howled; The trees danced."],
["Hyperbole","Exaggeration for poetic or rhetorical effect.","I could sleep for a month; Cry me a river."],
["Euphemism","A mild expression used instead of a harsh one.","Crossed the rainbow bridge (died)."],
["Irony","Something happens differently from what is expected.","A fire station burns down (situational)."],
["Oxymoron","Placing antonymous words alongside each other.","Deafening silence; Living dead."],
["Paradox","A self-contradictory statement which holds an underlying truth.","Less is more."],
["Antithesis","Highlighting the contrast of two opposing ideas.","To err is human; to forgive, divine."],
["Synecdoche","Using part to represent the whole, or vice versa.","All hands on deck."],
["Metonymy","Using the name of one thing for another it's associated with.","The Crown (monarchy)."],
["Chiasmus","A two-part phrase where the second inverts the first.","Ask not what your country can do for you..."],
["Allegory","Characters or events symbolically represent abstract ideas.","Animal Farm (Russian Revolution)."],

["Litotes","Understatement using double negation to create a positive.","Not unhappy (= happy)."],

confused:{id:"confused",nm:"Commonly Confused Words",ic:"🔄",cnt:"30 pairs",col:"#712B13",ct:"confused",cards:[
["Affect vs Effect","Affect (verb): to influence. Effect (noun): the result.","The weather affected our mood. The effect was visible."],
["Flaunt vs Flout","Flaunt: to show off. Flout: to openly disregard a rule.","She flaunted her wealth. He flouted traffic laws."],
["Eminent vs Imminent","Eminent: famous and respected. Imminent: about to happen.","An eminent scholar. A storm is imminent."],
["Complement vs Compliment","Complement: to complete or go well with. Compliment: to praise.","The wine complements the cheese."],
["Elicit vs Illicit","Elicit: to draw out a response. Illicit: illegal or forbidden.","Her question elicited anger."],
["Infer vs Imply","Infer: to conclude from evidence. Imply: to hint or suggest.","I inferred she was unhappy."],
["Adverse vs Averse","Adverse: harmful or unfavourable. Averse: having a strong dislike.","Adverse weather. She is averse to risk."],
["Reticent vs Reluctant","Reticent: not revealing thoughts. Reluctant: unwilling to do something.","She was reticent about her past."],
["Specious vs Spurious","Specious: seemingly correct but wrong. Spurious: false or fake.","A specious argument. A spurious claim."],

function makeLocalQuiz(mod){
  const cards=shuffle(mod.cards);const qs=[];
  if(mod.ct==="vocab"){
    cards.slice(0,3).forEach(c=>{const wrong=shuffle(mod.cards.filter(x=>x[0]!==c[0])).slice(0,3).map(x=>x[2]);const opts=shuffle([c[2],...wrong]);qs.push({q:`What does "${c[0]}" mean?`,opts:opts.map((o,i)=>["A","B","C","D"][i]+". "+o),ans:opts.indexOf(c[2]),exp:`${c[0]}: ${c[2]}. Synonyms: ${c[3]}`});});
    cards.slice(3,5).forEach(c=>{const syn=c[3].split(",")[0].trim();const wrongs=shuffle(mod.cards.filter(x=>x[0]!==c[0])).slice(0,3).map(x=>x[3].split(",")[0].trim());const opts=shuffle([syn,...wrongs]);qs.push({q:`Which is a synonym of "${c[0]}"?`,opts:opts.map((o,i)=>["A","B","C","D"][i]+". "+o),ans:opts.indexOf(syn),exp:`Synonyms of ${c[0]}: ${c[3]}`});});
  } else if(mod.ct==="collective"){
    shuffle(mod.cards).slice(0,5).forEach(c=>{const wrong=shuffle(mod.cards.filter(x=>x[1]!==c[1])).slice(0,3).map(x=>x[0]);const opts=shuffle([c[0],...wrong]);qs.push({q:`A _______ of ${c[1]}?`,opts:opts.map((o,i)=>["A","B","C","D"][i]+". "+o),ans:opts.indexOf(c[0]),exp:`A ${c[0]} of ${c[1]}.`});});
  } else if(mod.ct==="idiom"){
    cards.slice(0,5).forEach(c=>{const wrong=shuffle(mod.cards.filter(x=>x[0]!==c[0])).slice(0,3).map(x=>x[1]);const opts=shuffle([c[1],...wrong]);qs.push({q:`What does "${c[0]}" mean?`,opts:opts.map((o,i)=>["A","B","C","D"][i]+". "+o),ans:opts.indexOf(c[1]),exp:`"${c[0]}": ${c[1]}`});});
  } else if(mod.ct==="figure"){
    cards.slice(0,5).forEach(c=>{const wrong=shuffle(mod.cards.filter(x=>x[0]!==c[0])).slice(0,3).map(x=>x[0]);const opts=shuffle([c[0],...wrong]);qs.push({q:`Which figure of speech is illustrated by: "${c[2].split(";")[0]}"?`,opts:opts.map((o,i)=>["A","B","C","D"][i]+". "+o),ans:opts.indexOf(c[0]),exp:`${c[0]}: ${c[1]}`});});
  } else if(mod.ct==="kangaroo"){
    cards.slice(0,5).forEach(c=>{const wrong=shuffle(mod.cards.filter(x=>x[0]!==c[0])).slice(0,3).map(x=>x[1]);const opts=shuffle([c[1],...wrong]);qs.push({q:`What synonym is hidden inside "${c[0]}"?`,opts:opts.map((o,i)=>["A","B","C","D"][i]+". "+o),ans:opts.indexOf(c[1]),exp:c[2]});});
  } else if(mod.ct==="story"){
    cards.slice(0,5).forEach(c=>{const wrong=shuffle(mod.cards.filter(x=>x[0]!==c[0])).slice(0,3).map(x=>x[1]);const opts=shuffle([c[1],...wrong]);qs.push({q:`Which language did "${c[0]}" originate from?`,opts:opts.map((o,i)=>["A","B","C","D"][i]+". "+o),ans:opts.indexOf(c[1]),exp:c[2]});});
  } else if(mod.ct==="loanword"){
    cards.slice(0,5).forEach(c=>{const wrong=shuffle(mod.cards.filter(x=>x[0]!==c[0])).slice(0,3).map(x=>x[2]);const opts=shuffle([c[2],...wrong]);qs.push({q:`What does "${c[0]}" (from ${c[1]}) mean?`,opts:opts.map((o,i)=>["A","B","C","D"][i]+". "+o),ans:opts.indexOf(c[2]),exp:`"${c[0]}" (${c[1]}): ${c[2]}. "${c[3]}"`});});
  } else if(mod.ct==="ism"){
    cards.slice(0,5).forEach(c=>{const wrong=shuffle(mod.cards.filter(x=>x[0]!==c[0])).slice(0,3).map(x=>x[0]);const opts=shuffle([c[0],...wrong]);qs.push({q:`Which ism is defined as: "${c[1].slice(0,80)}..."?`,opts:opts.map((o,i)=>["A","B","C","D"][i]+". "+o),ans:opts.indexOf(c[0]),exp:`${c[0]}: ${c[1]}${c[2]?" Thinker: "+c[2]:""}`});});
  } else if(mod.ct==="philosophy"){
    cards.slice(0,5).forEach(c=>{const wrong=shuffle(mod.cards.filter(x=>x[0]!==c[0])).slice(0,3).map(x=>x[1]);const opts=shuffle([c[1],...wrong]);qs.push({q:`Which philosopher(s) are most associated with "${c[0]}"?`,opts:opts.map((o,i)=>["A","B","C","D"][i]+". "+o),ans:opts.indexOf(c[1]),exp:`${c[0]} (${c[1]}): ${c[2]}`});});
  } else if(mod.ct==="art"){
    cards.slice(0,5).forEach(c=>{const wrong=shuffle(mod.cards.filter(x=>x[0]!==c[0])).slice(0,3).map(x=>x[0]);const opts=shuffle([c[0],...wrong]);qs.push({q:`Which art movement is characterised by: "${c[2].slice(0,70)}..."?`,opts:opts.map((o,i)=>["A","B","C","D"][i]+". "+o),ans:opts.indexOf(c[0]),exp:`${c[0]} (${c[1]}): ${c[2]}. Artists: ${c[3]}`});});
  } else if(mod.ct==="confused"){
    cards.slice(0,5).forEach(c=>{qs.push({q:`Which correctly distinguishes "${c[0]}"?`,opts:[`A. ${c[1].slice(0,70)}`,`B. They mean the same thing`,`C. Both are nouns`,`D. Both are verbs`],ans:0,exp:c[1]+" Example: "+c[2]});});
  }
  return qs.slice(0,5);
}

async function startQuiz(){
  const mod=ST.mod;
  set({view:"quiz",qs:[],qi:0,qa:[],qload:true,qdone:false,qmode:""});
  const sample=mod.cards.slice(0,10);
  let content="";
  if(mod.ct==="vocab") content=sample.map(c=>`${c[0]} (${c[1]}): ${c[2]}. Synonyms: ${c[3]}. Antonyms: ${c[4]}.`).join("\n");
  else if(mod.ct==="ism") content=sample.map(c=>`${c[0]}: ${c[1]} Thinker: ${c[2]||"Various"}`).join("\n");
  else if(mod.ct==="collective") content=sample.map(c=>`A ${c[0]} of ${c[1]}`).join(", ");
  else if(mod.ct==="figure") content=sample.map(c=>`${c[0]}: ${c[1]} Example: ${c[2]}`).join("\n");
  else if(mod.ct==="idiom") content=sample.map(c=>`"${c[0]}": ${c[1]}`).join("\n");
  else if(mod.ct==="confused") content=sample.map(c=>`${c[0]}: ${c[1]}`).join("\n");
  else if(mod.ct==="kangaroo") content=sample.map(c=>`${c[0]} contains ${c[1]}`).join("\n");
  else if(mod.ct==="story") content=sample.map(c=>`${c[0]} from ${c[1]}: ${c[2]}`).join("\n");
  else if(mod.ct==="loanword") content=sample.map(c=>`${c[0]} (from ${c[1]}): ${c[2]}`).join("\n");
  else if(mod.ct==="philosophy") content=sample.map(c=>`${c[0]} (${c[1]}): ${c[2]}`).join("\n");
  else if(mod.ct==="art") content=sample.map(c=>`${c[0]} (${c[1]}): ${c[2]}. Artists: ${c[3]}`).join("\n");
  try{
    const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:2000,system:"You are a CAT exam quiz generator. Respond ONLY with a raw JSON array — no markdown, no code fences.",messages:[{role:"user",content:`Generate 5 challenging varied MCQ questions for CAT students:\n\n${content}\n\nReturn ONLY raw JSON:\n[{"q":"...","opts":["A. ...","B. ...","C. ...","D. ..."],"ans":0,"exp":"..."}]`}]})});
    const data=await r.json();
    let txt=(data.content||[]).filter(x=>x.type==="text").map(x=>x.text).join("").trim();
    txt=txt.replace(/```[\w]*\n?/gi,"").replace(/```/g,"").trim();
    const s=txt.indexOf("["),e=txt.lastIndexOf("]");
    if(s<0||e<0) throw new Error("no array");
    const parsed=JSON.parse(txt.slice(s,e+1));
    if(!Array.isArray(parsed)||!parsed.length) throw new Error("empty");
    set({qload:false,qs:parsed.slice(0,5),qi:0,qa:[],qmode:"ai"});
  }catch(err){
    set({qload:false,qs:makeLocalQuiz(mod),qi:0,qa:[],qmode:"local"});
  }
}

function answer(i){
  if(ST.qa[ST.qi]!==undefined)return;
  const qa=[...ST.qa];qa[ST.qi]=i;set({qa});
  if(ST.qi>=ST.qs.length-1){setTimeout(()=>{const sc=qa.filter((a,j)=>a===ST.qs[j].ans).length;saveAtt({name:ST.st.name,batch:ST.st.batch,mod:ST.mod.nm,score:sc,total:ST.qs.length,mode:ST.qmode,date:new Date().toLocaleDateString("en-IN"),time:new Date().toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit"})});set({qdone:true});},700);}
  else{setTimeout(()=>set({qi:ST.qi+1}),900);}
}

    <div style="text-align:center;margin-top:12px">
      <button id="blfac" style="background:none;border:none;color:#6b7280;cursor:pointer;font-size:13px;text-decoration:underline">Faculty Login</button>
    </div>
  </div></div>`;
}

function pDash(){
  const st=ST.st;
  const cards=MIDS.map(id=>{const m=D[id];return`<div class="mcard" data-mid="${id}"><div class="micon">${m.ic}</div><div class="mname">${m.nm}</div><div class="mcnt">${m.cnt}</div></div>`;
  }).join("");
  return`<div class="app">${hdr("VARC Hub",`${st.name} · ${st.batch}`)}
  <div class="pg">
    <div style="font-size:15px;font-weight:700;color:#1F3864;margin-bottom:4px">Choose a module</div>
    <div style="font-size:13px;color:#6b7280;margin-bottom:12px">Each has Learn (flashcards) and Quiz modes</div>
    <div class="mgrid">${cards}</div>
    <div style="margin-top:14px;background:#1F3864;border-radius:10px;padding:12px 14px;font-size:13px;color:#C8941A;font-weight:600">Quiz scores are recorded and visible to Aditi Ma'am. Aim for 4/5 or above!</div>
  </div></div>`;
}

function pLearn(){
  const m=ST.mod,cards=m.cards,card=cards[ST.ci],ct=getFC(m,card);
  const pct=Math.round((ST.ci+1)/cards.length*100);
  return`<div class="app">${hdr(m.nm,`${m.ic} Learn Mode`,true)}
  <div class="pg"><div class="pbar"><div class="pfill" style="width:${pct}%"></div></div>
  <div class="fcwrap" id="fcw"><div class="fci${ST.flip?" flipped":""}">
    <div class="fcf" style="background:${m.col}">${ct.f}</div>
    <div class="fcb">${ct.b}</div>
  </div></div>
  <div class="fcnav"><button class="fcnb" id="bprev" ${ST.ci===0?"disabled":""}>← Prev</button><div class="fccount">Card ${ST.ci+1} / ${cards.length}</div><button class="fcnb gold" id="bflip">Flip Card</button><button class="fcnb" id="bnext" ${ST.ci>=cards.length-1?"disabled":""}>Next →</button></div>
  <button class="btn" id="bquiz">Take Quiz on ${m.nm} →</button></div></div>`;
}

function pQuiz(){
  const m=ST.mod;
  if(ST.qload) return`<div class="app">${hdr(m.nm,"Generating quiz...",true)}<div class="pg" style="text-align:center;padding-top:40px"><div style="font-size:36px;margin-bottom:14px">🤖</div><div style="font-size:18px;font-weight:700;color:#1F3864">Preparing your quiz...</div><div style="font-size:13px;color:#6b7280;margin-top:6px">Crafting 5 tailored questions</div></div></div>`;
  if(ST.qdone){
    const sc=ST.qa.filter((a,i)=>a===ST.qs[i].ans).length,pct=Math.round(sc/ST.qs.length*100);
    const col=pct>=80?"#16a34a":pct>=60?"#C8941A":"#dc2626",lbl=pct>=80?"Excellent!":pct>=60?"Good effort!":"Keep revising!";
    return`<div class="app">${hdr("Quiz Complete","Results")}
    <div class="pg"><div style="text-align:center;padding:14px 0 18px"><div style="font-size:44px">${pct>=80?"🏆":pct>=60?"👍":"📖"}</div><div class="rsc" style="color:${col}">${sc}/${ST.qs.length}</div><div class="rlbl" style="color:${col}">${lbl}</div><div style="font-size:13px;color:#6b7280;margin-top:4px">${m.nm} · ${ST.st.batch}${ST.qmode==="local"?" · Offline":""}</div></div>
    <div class="card" style="margin-bottom:14px">${ST.qs.map((q,i)=>{const ua=ST.qa[i],ok=ua===q.ans;return`<div style="margin-bottom:12px;padding-bottom:12px;${i<ST.qs.length-1?"border-bottom:1px solid #eee":""}"><div style="font-size:14px;font-weight:700;color:#1a1a2e;margin-bottom:5px">Q${i+1}. ${q.q}</div><div style="font-size:13px;color:${ok?"#16a34a":"#dc2626"};font-weight:600">${ok?"✓ Correct":"✗ Your answer: "+q.opts[ua]}</div>${!ok?`<div style="font-size:13px;color:#16a34a;font-weight:600">✓ Correct: ${q.opts[q.ans]}</div>`:""}</div>`;
    }).join("")}</div>
    <button class="btn" id="btodash">Back to Dashboard</button>
    <button style="display:block;width:100%;margin-top:10px;padding:12px;background:#2d4f7c;color:#fff;border:2px solid #4a6fa5;border-radius:8px;cursor:pointer;font-size:14px;font-weight:700;font-family:inherit" id="bretake">Retake Quiz</button>
    </div></div>`;
  }
  if(!ST.qs.length) return`<div class="app">${hdr(m.nm,"Quiz",true)}<div class="pg"><p style="color:#1a1a2e">Loading...</p></div></div>`;
  const q=ST.qs[ST.qi],pct=Math.round((ST.qi+1)/ST.qs.length*100),ans=ST.qa[ST.qi],done=ans!==undefined;
  return`<div class="app">${hdr(m.nm,`Q${ST.qi+1} of ${ST.qs.length}${ST.qmode==="local"?" · Offline":""}`,true)}
  <div class="pg"><div class="pbar"><div class="pfill" style="width:${pct}%"></div></div>
  <div class="qbox"><div class="qtext">${q.q}</div></div>
  ${q.opts.map((opt,i)=>{let cls="qopt";if(done){if(i===q.ans)cls+=" correct";else if(i===ans)cls+=" wrong";}return`<button class="${cls}" data-oi="${i}" ${done?"disabled":""}>${opt}</button>`;
  }).join("")}
  ${done&&q.exp?`<div class="qexp">${q.exp}</div>`:""}
  ${done&&ST.qi<ST.qs.length-1?`<button class="btn" style="margin-top:14px" id="bnxtq">Next Question →</button>`:""}</div></div>`;
}

function pFac(){
  if(!ST.st||!ST.st.isFac){
    return`<div class="app">${hdr("Faculty Dashboard","Restricted",true)}
    <div class="pg" style="padding-top:20px"><div class="card" style="max-width:360px;margin:0 auto">
      <div style="text-align:center;margin-bottom:16px"><div style="font-size:32px;margin-bottom:6px">🔒</div><div style="font-size:16px;font-weight:700;color:#1F3864">Faculty Access Only</div></div>
      <label>Faculty Password</label><input type="password" id="fp" placeholder="Enter password">
      ${ST.ferr?`<div class="err">${ST.ferr}</div>`:""}
      <button class="btn" style="margin-top:12px" id="bfin">Access Dashboard</button>
      <div style="text-align:center;margin-top:10px"><button id="bfbk" style="background:none;border:none;color:#6b7280;cursor:pointer;font-size:12px;text-decoration:underline">Back to Student Login</button></div>
    </div></div></div>`;
  }
  const atts=ST.atts,avg=atts.length?Math.round(atts.reduce((s,a)=>s+(a.score/a.total*100),0)/atts.length):0,studs=new Set(atts.map(a=>a.name)).size;
  return`<div class="app">${hdr("Faculty Dashboard",`IMS Gujarat · AB · ${new Date().toLocaleDateString("en-IN")}`)}
  <div class="pg">
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px">
      <div class="sbox"><div class="sn">${atts.length}</div><div class="sl">Attempts</div></div>
      <div class="sbox"><div class="sn">${avg}%</div><div class="sl">Avg Score</div></div>
      <div class="sbox"><div class="sn">${studs}</div><div class="sl">Students</div></div>
    </div>
    ${atts.length===0?`<div style="text-align:center;padding:32px;color:#6b7280;font-size:15px">No attempts yet. Data appears here once students complete quizzes.</div>`:`
    <div style="overflow-x:auto;border-radius:10px;border:1.5px solid #d4daea">
      <table class="stbl"><thead><tr><th>Student</th><th>Batch</th><th>Module</th><th>Score</th><th>When</th></tr></thead>
      <tbody>${atts.slice().reverse().map(a=>`<tr><td style="font-weight:700">${a.name}</td><td><span class="bdg">${a.batch}</span></td><td style="font-size:12px">${a.mod}</td><td style="font-weight:700;color:${a.score/a.total>=.8?"#16a34a":a.score/a.total>=.6?"#C8941A":"#dc2626"}">${a.score}/${a.total}</td><td style="font-size:11px">${a.date} ${a.time||""}</td></tr>`).join("")}</tbody>
      </table></div>`}
    <button style="display:block;width:100%;margin-top:14px;padding:12px;background:#2d4f7c;color:#fff;border:2px solid #4a6fa5;border-radius:8px;cursor:pointer;font-size:14px;font-weight:700;font-family:inherit" id="bso">Sign Out</button>
  </div></div>`;
}

function wire(){
  const g=id=>document.getElementById(id);
  if(ST.view==="login"){
    g("blin")?.addEventListener("click",()=>{
      const bat=g("lb").value,nm=g("ln").value,pw=g("lp").value.trim().toLowerCase(),er=g("lerr");
      if(!bat||!nm||nm==="Select batch first"||!pw){er.style.display="block";er.textContent="Please fill in all fields.";return;}
      // Validate: password must exist in S and map to selected batch
      const rec=S[pw];
      if(!rec){er.style.display="block";er.textContent="Password not recognised. Please check your IMS PIN and try again.";return;}
      if(rec!==bat){er.style.display="block";er.textContent=`Password is correct but doesn't match batch ${bat}. Are you in a different batch?`;return;}
      er.style.display="none";
      set({st:{name:nm,batch:bat},view:"dashboard"});
    });
    g("blfac")?.addEventListener("click",()=>set({view:"faculty",st:null,ferr:""}));
  }
  if(ST.view==="dashboard") document.querySelectorAll(".mcard").forEach(el=>el.addEventListener("click",()=>set({mod:D[el.dataset.mid],ci:0,flip:false,view:"learn"})));
  if(ST.view==="learn"){
    g("bbk")?.addEventListener("click",()=>set({view:"dashboard"}));
    g("bflip")?.addEventListener("click",()=>set({flip:!ST.flip}));
    g("fcw")?.addEventListener("click",()=>set({flip:!ST.flip}));
    g("bprev")?.addEventListener("click",()=>set({ci:Math.max(0,ST.ci-1),flip:false}));
    g("bnext")?.addEventListener("click",()=>set({ci:Math.min(ST.mod.cards.length-1,ST.ci+1),flip:false}));
    g("bquiz")?.addEventListener("click",startQuiz);
  }
  if(ST.view==="quiz"){
    g("bbk")?.addEventListener("click",()=>set({view:"dashboard",qload:false}));
    g("btodash")?.addEventListener("click",()=>set({view:"dashboard"}));
    g("bretake")?.addEventListener("click",startQuiz);
    g("bnxtq")?.addEventListener("click",()=>set({qi:ST.qi+1}));
    document.querySelectorAll(".qopt").forEach(b=>b.addEventListener("click",()=>answer(parseInt(b.dataset.oi))));
  }
  if(ST.view==="faculty"){
    g("bbk")?.addEventListener("click",()=>set({view:"login",st:null}));
    g("bfbk")?.addEventListener("click",()=>set({view:"login",st:null}));
    g("bfin")?.addEventListener("click",()=>{const pw=g("fp")?.value;if(pw==="IMS@Faculty")set({st:{name:"Faculty",isFac:true},ferr:""});else set({ferr:"Incorrect password."});});
    g("bso")?.addEventListener("click",()=>set({view:"login",st:null}));
  }
}

window.updNames=function(){
  const bat=document.getElementById("lb")?.value,ln=document.getElementById("ln");
  if(!ln)return;
  const names=BN[bat]||[];
  ln.innerHTML=names.length?names.map(n=>`<option value="${n}">${n}</option>`).join(""):`<option value="">No students found</option>`;
  // Update password hint
  const pw=document.getElementById("lp");
  if(pw&&names.length) pw.placeholder=`First 4 letters of your name + last 4 digits of IMS PIN`;
};

loadAtts().then(draw);
</script>
